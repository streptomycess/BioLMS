{% extends 'biology/base.html' %}

{% block title %}{{ lesson.title }}{% endblock %}

{% block content %}
    <h1>Урок: {{ lesson.title }}</h1>

    <iframe width="800" height="450" src="{{ lesson.embed_url }}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>

    <br><br>
    <a href="{% url 'lesson_quiz' lesson.id %}" class="btn btn-success">Перейти к квизу</a>
{% endblock %}
